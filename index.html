<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixMyMeal Lite</title>

<style>
body {
  font-family: Arial;
  background: #f0fff4;
  text-align: center;
  margin: 0;
}

.dark {
  background: #121212;
  color: white;
}

.container {
  padding: 20px;
}

button {
  padding: 10px;
  margin: 10px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

input, select {
  padding: 8px;
  margin: 10px;
}

.card {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 10px;
}

.dark .card {
  background: #1e1e1e;
}

/* Wheel */
.wheel {
  width: 150px;
  height: 150px;
  margin: auto;
  border-radius: 50%;
  background: conic-gradient(
    #22c55e 0% 16.6%,
    #16a34a 16.6% 33.3%,
    #4ade80 33.3% 50%,
    #15803d 50% 66.6%,
    #86efac 66.6% 83.3%,
    #166534 83.3% 100%
  );
  transition: transform 3s ease-out;
}
</style>
</head>

<body>

<button onclick="toggleTheme()">🌗 Toggle Mode</button>

<div class="container">

<h2>FixMyMeal Lite</h2>
<p>"Best food based on your real situation"</p>

<input type="range" id="budget" min="50" max="200" value="100">
<br>

<select id="food">
<option value="">Food Type</option>
<option value="mess">Mess</option>
<option value="home">Home</option>
<option value="street">Street</option>
</select>

<select id="health">
<option value="">Health</option>
<option value="acidity">Acidity</option>
<option value="weakness">Weakness</option>
<option value="general">General</option>
</select>

<br>
<input type="date" id="birthday">
<input type="text" id="student" placeholder="Student ID">

<br>
<button onclick="suggest()">What Should I Eat?</button>

<div class="card" id="result"></div>

<hr>

<h3>🎡 Lucky Wheel</h3>
<div class="wheel" id="wheel"></div>
<button onclick="spin()">Spin</button>
<p id="offer"></p>

</div>

<script>
function toggleTheme(){
 document.body.classList.toggle("dark");
}

function isBirthday(){
 const b = document.getElementById("birthday").value;
 if(!b) return false;
 const d = new Date();
 const bd = new Date(b);
 return d.getDate()==bd.getDate() && d.getMonth()==bd.getMonth();
}

function studentDiscount(){
 const id = document.getElementById("student").value;
 if(id.length>=5) return 15;
 return 0;
}

function suggest(){
 let budget = document.getElementById("budget").value;
 let food = document.getElementById("food").value;
 let health = document.getElementById("health").value;

 if(!food || !health){
  alert("Select all fields");
  return;
 }

 let meal="Simple Meal";
 let reason="Balanced";

 if(health=="acidity"){
  meal="Rice + Curd + Banana";
  reason="Cools stomach";
 }

 if(health=="weakness"){
  meal="Roti + Dal + Egg";
  reason="Gives energy";
 }

 let price = 100;

 if(isBirthday()){
  price*=0.8;
 }

 let sd = studentDiscount();
 if(sd>0){
  price -= price*sd/100;
 }

 document.getElementById("result").innerHTML =
  "<h3>"+meal+"</h3><p>"+reason+"</p><p>Price: ₹"+Math.floor(price)+"</p>";
}

function spin(){
 const wheel = document.getElementById("wheel");
 const offers = ["10% OFF","20% OFF","Free Fruit","Try Again","Healthy Upgrade"];
 let i = Math.floor(Math.random()*offers.length);
 let deg = 360*5 + i*72;
 wheel.style.transform="rotate("+deg+"deg)";
 setTimeout(()=>{
  document.getElementById("offer").innerText="You got: "+offers[i];
 },3000);
}
</script>

</body>
</html>
