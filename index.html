<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixMyMeal Lite</title>

<style>
body {
  font-family: Arial;
  background: #f0fff4;
  text-align: center;
  margin: 0;
}
.dark {
  background: #121212;
  color: white;
}
.container {
  padding: 20px;
}
button {
  padding: 10px;
  margin: 10px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
input, select {
  padding: 8px;
  margin: 10px;
}
.card {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 10px;
}
.dark .card {
  background: #1e1e1e;
}

/* Wheel */
.wheel {
  width: 150px;
  height: 150px;
  margin: auto;
  border-radius: 50%;
  background: conic-gradient(
    #22c55e 0% 16.6%,
    #16a34a 16.6% 33.3%,
    #4ade80 33.3% 50%,
    #15803d 50% 66.6%,
    #86efac 66.6% 83.3%,
    #166534 83.3% 100%
  );
  transition: transform 3s ease-out;
}
</style>
</head>

<body>

<button onclick="toggleTheme()">🌗 Toggle Mode</button>

<div class="container">

<h2>FixMyMeal Lite</h2>
<p>"Best food based on your real situation"</p>

<input type="range" id="budget" min="50" max="200" value="100"><br>

<select id="food">
<option value="">Food Type</option>
<option value="mess">Mess</option>
<option value="home">Home</option>
<option value="street">Street</option>
</select>

<select id="health">
<option value="">Health</option>
<option value="acidity">Acidity</option>
<option value="weakness">Weakness</option>
<option value="weightloss">Weight Loss</option>
<option value="musclegain">💪 Muscle Gain</option>
<option value="general">General</option>
</select>

<br>
<input type="date" id="birthday">

<br>
<button onclick="suggest()">What Should I Eat?</button>

<div class="card" id="result"></div>

<hr>

<h3>🎡 Lucky Wheel</h3>
<div class="wheel" id="wheel"></div>
<button onclick="spin()">Spin</button>
<p id="offer"></p>

</div>

<script>
function toggleTheme(){
 document.body.classList.toggle("dark");
}

function isBirthday(){
 const b = document.getElementById("birthday").value;
 if(!b) return false;
 const d = new Date();
 const bd = new Date(b);
 return d.getDate()==bd.getDate() && d.getMonth()==bd.getMonth();
}

function suggest(){
 let food = document.getElementById("food").value;
 let health = document.getElementById("health").value;

 if(!food || !health){
  alert("Select all fields");
  return;
 }

 let meal="", reason="", price=80;

 // ACIDITY
 if(health=="acidity"){
  if(food=="mess"){ meal="Rice + Curd + Banana"; reason="Cools stomach"; price=70;}
  else if(food=="home"){ meal="Khichdi + Curd"; reason="Light food"; price=60;}
  else{ meal="Idli + Coconut Chutney"; reason="Low oil"; price=80;}
 }

 // WEAKNESS
 else if(health=="weakness"){
  if(food=="mess"){ meal="Roti + Dal + Egg"; reason="Energy boost"; price=90;}
  else if(food=="home"){ meal="Rice + Dal + Egg"; reason="High nutrition"; price=100;}
  else{ meal="Egg Roll + Banana Shake"; reason="Quick energy"; price=100;}
 }

 // WEIGHT LOSS
 else if(health=="weightloss"){
  if(food=="mess"){ meal="Roti + Dal + Salad"; reason="Low calorie"; price=80;}
  else if(food=="home"){ meal="Veggies + Roti"; reason="High fiber"; price=70;}
  else{ meal="Veg Sandwich"; reason="Light meal"; price=60;}
 }

 // 💪 MUSCLE GAIN
 else if(health=="musclegain"){
  if(food=="mess"){ meal="Rice + Dal + 2 Eggs"; reason="High protein"; price=100;}
  else if(food=="home"){ meal="Chapati + Egg Curry + Milk"; reason="Muscle growth"; price=120;}
  else{ meal="Chicken Roll + Eggs"; reason="Protein rich"; price=120;}
 }

 // GENERAL
 else{
  if(food=="mess"){ meal="Rice + Dal + Veg + Curd"; reason="Balanced meal"; price=90;}
  else if(food=="home"){ meal="Chapati + Sabzi + Dal"; reason="Healthy"; price=80;}
  else{ meal="Paneer Wrap + Juice"; reason="Balanced"; price=100;}
 }

 // Birthday discount
 if(isBirthday()){
  price *= 0.8;
  alert("🎉 Happy Birthday! 20% OFF");
 }

 let score = Math.floor(Math.random()*3)+7;

 document.getElementById("result").innerHTML =
  "<h3>"+meal+"</h3>" +
  "<p>"+reason+"</p>" +
  "<p>💰 Price: ₹"+Math.floor(price)+"</p>" +
  "<p>⭐ Health Score: "+score+"/10</p>";
}

function spin(){
 const wheel = document.getElementById("wheel");
 const offers = ["10% OFF","20% OFF","Free Fruit","Try Again","Healthy Upgrade"];
 let i = Math.floor(Math.random()*offers.length);
 let deg = 360*5 + i*72;
 wheel.style.transform="rotate("+deg+"deg)";
 setTimeout(()=>{
  document.getElementById("offer").innerText="🎉 You got: "+offers[i];
 },3000);
}
</script>

</body>
</html>
